<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<title>Jogo da velha</title>
		<meta charset="UTF-8" />
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
		<link rel="stylesheet" href="src/styles/estilo.css" />
		<link rel="stylesheet" href="src/styles/reset.css" />
	</head>

	<body class="overflow-hidden mx-auto">
		<!-- NAVBAR -->
		<nav class="navbar align-items-center d-flex justify-content-center p-10 border-bottom-dark">
			<img
				class="icon-logo-img d-inline-block rounded-10 me-md-5"
				src="src/assets/icon-logo.jpg"
				alt="Jogador 1"
				width="50px"
				height="50px"
			/>
			<h1 class="colorTexto align-items-center justify-content-center text d-flex h2">
				BEM VINDOS AO JOGO DA VELHA <br />
				BOA SORTE E DIVIRTA-SE!!
			</h1>
		</nav>


        <div class="container-pai d-flex justify-content-between align-items-center">
            <!--CONTAINER DOS JOGADORES 1 - ICONES E TEXTOS -->
            <div>
                <div class="jogador colorTexto d-flex">
                    <img
                        class="jogador-icon" width="150px" 
                        height="150px";
                        src="src/assets/jogador3.png"
                        alt="Jogador 1"
                    />
                    <p class="mt-3">Jogador 1</p>
                    <p class="mt-3"></p>
                </div>
            </div>
            
            <!-- Adicionando a classe .container aqui -->
            <div class="container d-inline-block p-5 mr-5">
                <div class="container1-quadrado dimenQuadrado rounded-2 d-flex mb-3">
                    <div id="1" class="quadrado" onclick="escolherQuadrado('1')">-</div>
                    <div id="2" class="quadrado" onclick="escolherQuadrado('2')">-</div>
                    <div id="3" class="quadrado" onclick="escolherQuadrado('3')">-</div>
                </div>

                <div class="container2-quadrado  dimenQuadrado d-flex">
                    <div id="4" class="quadrado" onclick="escolherQuadrado('4')">-</div>
                    <div id="5" class="quadrado" onclick="escolherQuadrado('5')">-</div>
                    <div id="6" class="quadrado" onclick="escolherQuadrado('6')">-</div>
                </div>

                <div class="container3-quadrado dimenQuadrado d-flex mt-3 ">
                    <div id="7" class="quadrado" onclick="escolherQuadrado('7')">-</div>
                    <div id="8" class="quadrado" onclick="escolherQuadrado('8')">-</div>
                    <div id="9" class="quadrado" onclick="escolherQuadrado('9')">-</div>
                </div>
            </div>
            
            <!--CONTAINER DOS JOGADORES 2 - ICONES E TEXTOS -->
            <div>
                <div class="jogador colorTexto d-flex fs-4">
                    <img
                        class="jogador-icon" width="150px" 
                        height="150px"
                        src="src/assets/jogador3.png"
                        alt="Jogador 2"
                    />
                    <p class="mt-3">Jogador 2</p>
                    <p class="mt-3"></p>
                </div>
            </div>
        </div>


		<!--CONTAINER DAS INFORMAÇÕES DOS JOGADORES E DO JOGO -->
		<div class="border d-block text-center mb-1 p-3">
			<div class="colorTexto mb-2 fs-5">
				<label> Vez da Peça: </label>
				<label id="jogador-selecionado"></label>
			</div>

			<div class="colorTexto mb-2 fs-5">
				<label classe="fs-1">Vencedor:</label>
				<label id="vencedor-selecionado" classe="vencedor"> </label>
			</div>

			<div class="rounded colorTexto mb-2" width="100px" height="30px">
				<button class="btn btn-dark fs-4" onclick="reiniciar()">Reiniciar</button>
			</div>
		</div>
	</body>

	<script src="src/scripts/velha.js"></script> 
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

</html>
